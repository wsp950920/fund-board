<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>热点资金榜 · 上证指数</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #050508;
    color: #ccc;
    padding: 0;
    min-height: 100vh;
    font-size: 11px;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    background: #0a0a0e;
    min-height: 100vh;
  }

  /* ===== Header ===== */
  .header {
    background: linear-gradient(180deg, #0f0f14 0%, #0a0a0e 100%);
    padding: 6px 12px 5px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  .header-top .left { display: flex; align-items: center; gap: 6px; }
  .header-top .left .date-tag {
    font-size: 9px; color: #fff; background: #e74c3c;
    padding: 1px 6px; border-radius: 2px; font-weight: 600;
  }
  .header-top .left h1 { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
  .header-top .time { font-size: 9px; color: rgba(255,255,255,0.3); }

  /* Session selector */
  .session-selector {
    display: flex; gap: 3px;
    padding: 3px 12px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .session-selector .s-btn {
    font-size: 9px; padding: 2px 10px;
    border-radius: 3px; border: none;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.3);
    cursor: pointer;
  }
  .session-selector .s-btn.active {
    background: rgba(231,76,60,0.15);
    color: #e74c3c;
  }

  /* Index bar */
  .index-row {
    display: flex; align-items: baseline; gap: 6px;
    padding: 4px 8px;
    background: rgba(255,255,255,0.02); border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.03);
  }
  .index-row .iname { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 500; }
  .index-row .iprice { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
  .index-row .iprice.up { color: #e74c3c; }
  .index-row .iprice.down { color: #27ae60; }
  .index-row .ichange { font-size: 11px; font-weight: 500; }
  .index-row .ichange.up { color: #e74c3c; }
  .index-row .ichange.down { color: #27ae60; }
  .index-row .isource { margin-left: auto; font-size: 8px; color: rgba(255,255,255,0.12); }

  /* ===== Stats bar ===== */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
    padding: 4px 12px;
    background: rgba(255,255,255,0.015);
    border-bottom: 1px solid rgba(255,255,255,0.025);
  }
  .stat-item { text-align: center; }
  .stat-item .slabel { font-size: 8px; color: rgba(255,255,255,0.3); margin-bottom: 1px; }
  .stat-item .svalue { font-size: 13px; font-weight: 700; }
  .stat-item .svalue.red { color: #e74c3c; }
  .stat-item .svalue.green { color: #27ae60; }
  .stat-item .svalue.white { color: #fff; }
  .stat-item .svalue.blue { color: #5b8ff9; }

  /* ===== Main Grid ===== */
  .main-grid { display: flex; flex-direction: column; gap: 1px; }

  /* ===== Panel ===== */
  .panel { padding: 5px 4px 4px; }
  .panel .ptitle {
    font-size: 11px; font-weight: 700; margin-bottom: 4px;
    display: flex; align-items: center; gap: 3px;
  }
  .panel.outflow .ptitle { color: #e74c3c; }
  .panel.inflow .ptitle { color: #27ae60; }
  .panel .ptitle .psub { font-size: 8px; font-weight: 400; margin-left: auto; color: rgba(255,255,255,0.2); }
  .panel .ptitle .pcount {
    font-size: 9px; font-weight: 600;
    background: rgba(255,255,255,0.05); padding: 0 5px; border-radius: 3px;
  }
  .panel.outflow .ptitle .pcount { color: #e74c3c; }
  .panel.inflow .ptitle .pcount { color: #27ae60; }

  /* Item */
  .item {
    display: flex; align-items: center;
    padding: 3px 2px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    border-radius: 3px;
  }
  .item:last-child { border-bottom: none; }
  .outflow .item.top1 { background: rgba(231,76,60,0.25); }
  .outflow .item.top2 { background: rgba(231,76,60,0.15); }
  .outflow .item.top3 { background: rgba(231,76,60,0.08); }
  .inflow .item.top1 { background: rgba(39,174,96,0.25); }
  .inflow .item.top2 { background: rgba(39,174,96,0.15); }
  .inflow .item.top3 { background: rgba(39,174,96,0.08); }
  .item .irank {
    font-size: 8px; color: rgba(255,255,255,0.25);
    width: 14px; height: 14px; line-height: 14px;
    text-align: center; flex-shrink: 0;
    border-radius: 2px;
  }
  .inflow .item.top1 .irank { background: #27ae60; color: #fff; font-weight: 700; }
  .inflow .item.top2 .irank { background: rgba(39,174,96,0.3); color: #27ae60; font-weight: 700; }
  .inflow .item.top3 .irank { background: rgba(39,174,96,0.15); color: #27ae60; font-weight: 600; }
  .outflow .item.top1 .irank { background: #e74c3c; color: #fff; font-weight: 700; }
  .outflow .item.top2 .irank { background: rgba(231,76,60,0.3); color: #e74c3c; font-weight: 700; }
  .outflow .item.top3 .irank { background: rgba(231,76,60,0.15); color: #e74c3c; font-weight: 600; }
  .item .iname {
    font-size: 13px;
    margin-left: 4px; min-width: 52px; flex-shrink: 0;
    font-weight: 600;
  }
  .outflow .item.top1 .iname { color: #e74c3c; }
  .outflow .item.top2 .iname { color: #e74c3c; }
  .outflow .item.top3 .iname { color: #e74c3c; }
  .inflow .item.top1 .iname { color: #27ae60; }
  .inflow .item.top2 .iname { color: #27ae60; }
  .inflow .item.top3 .iname { color: #27ae60; }
  .outflow .item .iname,
  .inflow .item .iname { color: rgba(255,255,255,0.88); }
  .item .ival {
    font-size: 11px; font-weight: 600; text-align: right;
    min-width: 42px; flex-shrink: 0; letter-spacing: 0.2px;
  }
  .item .ival.red { color: #e74c3c; }
  .item .ival.green { color: #27ae60; }
  .item .ibar {
    flex: 1; height: 6px; border-radius: 3px;
    background: rgba(255,255,255,0.06);
    margin: 0 3px; overflow: hidden;
    position: relative;
  }
  .item .ibar .bfill {
    height: 100%;
    border-radius: 3px;
    position: absolute; left: 0; top: 0;
  }
  .bfill.red-bar { background: #e74c3c; }
  .bfill.green-bar { background: #27ae60; }

  /* ===== Total Row ===== */
  .total-row {
    display: flex; align-items: center;
    padding: 4px 12px; gap: 6px;
    background: rgba(255,255,255,0.01);
    border-top: 1px solid rgba(255,255,255,0.03);
  }
  .total-row .tlabel { font-size: 9px; color: rgba(255,255,255,0.3); }
  .total-row .tval { font-size: 11px; font-weight: 700; }
  .total-row .tval.red { color: #e74c3c; }
  .total-row .tval.green { color: #27ae60; }

  /* ===== Footer ===== */
  .footer {
    padding: 4px 12px; font-size: 8px; color: rgba(255,255,255,0.1);
    border-top: 1px solid rgba(255,255,255,0.02);
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div class="header-top">
    <div class="left">
      <span class="date-tag" id="dateTag">7月03日</span>
      <h1>热点资金榜</h1>
    </div>
    <span class="time" id="updateTime">更新中</span>
  </div>
  <div class="session-selector">
    <button class="s-btn" data-session="morning">早盘</button>
    <button class="s-btn active" data-session="noon">午盘</button>
    <button class="s-btn" data-session="close">收盘</button>
  </div>
  <div class="index-row">
    <span class="iname">上证指数</span>
    <span class="iprice" id="indexPrice">--</span>
    <span class="ichange" id="indexChange">--</span>
    <span class="isource">东方财富 · 实时</span>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item">
    <div class="slabel">主力净流入</div>
    <div class="svalue red" id="mainNet">--</div>
  </div>
  <div class="stat-item">
    <div class="slabel">上涨家数</div>
    <div class="svalue white" id="upCount">--</div>
  </div>
  <div class="stat-item">
    <div class="slabel">下跌家数</div>
    <div class="svalue white" id="dnCount">--</div>
  </div>
  <div class="stat-item">
    <div class="slabel">成交额</div>
    <div class="svalue blue" id="volume">--</div>
  </div>
</div>

<div class="main-grid">
  <div class="panel outflow">
    <div class="ptitle">
      🔴 流出
      <span class="pcount" id="outCount">10</span>
      <span class="psub">按净流出金额排序</span>
    </div>
    <div id="outflowList"></div>
  </div>
  <div class="panel inflow" style="border-top:1px solid rgba(255,255,255,0.04)">
    <div class="ptitle">
      🟢 流入
      <span class="pcount" id="inCount">10</span>
      <span class="psub">按净流入金额排序</span>
    </div>
    <div id="inflowList"></div>
  </div>
</div>

<div class="total-row">
  <span class="tlabel">流出合计</span>
  <span class="tval red" id="totalOut">--</span>
  <span class="tlabel">流入合计</span>
  <span class="tval green" id="totalIn">--</span>
  <span class="tlabel">净流向</span>
  <span class="tval" id="netFlow">--</span>
</div>

<div class="footer">
  <span>数据来源: 东方财富</span>
  <span id="footerTime">--</span>
</div>

</div>

<script>
const SCREENSHOT_DATA = {
  outflow: [
    { name: "半导体", flow: -408.6 }, { name: "国产芯片", flow: -206.0 },
    { name: "存储芯片", flow: -187.5 }, { name: "物联网", flow: -134.8 },
    { name: "光纤", flow: -130.7 }, { name: "玻璃基板", flow: -92.8 },
    { name: "消费电子", flow: -64.7 }, { name: "固态电池", flow: -61.1 },
    { name: "人工智能", flow: -55.7 }, { name: "锂电池", flow: -55.0 }
  ],
  inflow: [
    { name: "机器人", flow: +128.6 }, { name: "新能源车", flow: +101.3 },
    { name: "低空经济", flow: +68.9 }, { name: "军工", flow: +45.5 },
    { name: "黄金", flow: +35.0 }, { name: "商业航天", flow: +17.4 },
    { name: "电子元件", flow: +5.1 }, { name: "创新药", flow: +3.3 },
    { name: "有色金属", flow: +3.2 }, { name: "电网设备", flow: +3.0 }
  ],
  index: { price: "4043.64", change: "+0.37%", isUp: true, volume: "1.47万亿" }
};

const CONCEPT_URL = 'https://push2.eastmoney.com/api/qt/clist/get?cb=&fid=f62&po=1&pz=30&pn=1&np=1&fltt=2&invt=2&fs=m:90+t:3&fields=f12,f14,f62,f69';
const INDEX_URL = 'https://push2.eastmoney.com/api/qt/stock/get?cb=&fltt=2&invt=2&secid=1.000001&fields=f43,f44,f45,f46,f47,f48,f50,f57,f58,f60,f152,f170';

async function fetchRealData() {
  try {
    const [conceptResp, idxResp] = await Promise.all([fetch(CONCEPT_URL), fetch(INDEX_URL)]);
    const conceptJson = await conceptResp.json();
    const idxJson = await idxResp.json();
    let idxData = null;
    if (idxJson.rc === 0 && idxJson.data) {
      const d = idxJson.data;
      const price = (d.f43 / 100).toFixed(2);
      const change = (d.f43 - d.f44) / 100;
      const changePct = d.f170 != null ? d.f170 / 100 : 0;
      const isUp = change >= 0;
      idxData = { price, change: (isUp ? '+' : '') + change.toFixed(2) + '%', isUp, volume: d.f48 ? (d.f48 / 1e8).toFixed(1) + '亿' : '--' };
    }
    let conceptData = null;
    if (conceptJson.rc === 0 && conceptJson.data) {
      const items = conceptJson.data.diff;
      const outflow = items.filter(i => (i.f62 || 0) < 0).slice(0, 10).map(i => ({ name: i.f14, flow: parseFloat((i.f62 / 1e8).toFixed(1)) }));
      const inflow = items.filter(i => (i.f62 || 0) > 0).slice(0, 10).map(i => ({ name: i.f14, flow: parseFloat((i.f62 / 1e8).toFixed(1)) }));
      if (outflow.length >= 5 && inflow.length >= 5) conceptData = { outflow, inflow };
    }
    return { idxData, conceptData };
  } catch(e) { return null; }
}

function render(data) {
  const { outflow, inflow, idxData, isSnapshot, snapTime } = data;
  const now = new Date();
  const mo = (now.getMonth()+1).toString().padStart(2,'0');
  const da = now.getDate().toString().padStart(2,'0');
  const labelMap = { morning: '早盘', noon: '午盘', close: '收盘' };
  document.getElementById('dateTag').textContent = mo + '月' + da + '日 ' + (labelMap[currentSession] || '收盘');
  const ts = now.toLocaleString('zh-CN', { hour12: false });
  document.getElementById('updateTime').textContent = snapTime ? '快照 ' + snapTime : ts;
  document.getElementById('footerTime').textContent = snapTime ? '快照于 ' + snapTime : '更新于 ' + ts;

  if (idxData) {
    document.getElementById('indexPrice').textContent = idxData.price;
    document.getElementById('indexPrice').className = 'iprice ' + (idxData.isUp ? 'up' : 'down');
    document.getElementById('indexChange').textContent = idxData.change;
    document.getElementById('indexChange').className = 'ichange ' + (idxData.isUp ? 'up' : 'down');
    document.getElementById('volume').textContent = idxData.volume || '--';
  } else {
    document.getElementById('indexPrice').textContent = SCREENSHOT_DATA.index.price;
    document.getElementById('indexPrice').className = 'iprice up';
    document.getElementById('indexChange').textContent = SCREENSHOT_DATA.index.change;
    document.getElementById('indexChange').className = 'ichange up';
  }

  document.getElementById('outCount').textContent = outflow.length;
  document.getElementById('inCount').textContent = inflow.length;

  const maxOut = Math.max(...outflow.map(i => Math.abs(i.flow)), 1);
  const maxIn = Math.max(...inflow.map(i => Math.abs(i.flow)), 1);
  const totalOut = outflow.reduce((s, i) => s + Math.abs(i.flow), 0);
  const totalIn = inflow.reduce((s, i) => s + i.flow, 0);
  const netFlowVal = totalIn - totalOut;

  document.getElementById('totalOut').textContent = '-' + totalOut.toFixed(1) + '亿';
  document.getElementById('totalIn').textContent = '+' + totalIn.toFixed(1) + '亿';
  document.getElementById('netFlow').textContent = (netFlowVal >= 0 ? '+' : '') + netFlowVal.toFixed(1) + '亿';
  document.getElementById('netFlow').className = 'tval ' + (netFlowVal >= 0 ? 'green' : 'red');
  document.getElementById('upCount').textContent = inflow.length + '家';
  document.getElementById('dnCount').textContent = outflow.length + '家';
  const mainNet = totalIn - totalOut;
  document.getElementById('mainNet').textContent = (mainNet >= 0 ? '+' : '') + mainNet.toFixed(1) + '亿';
  document.getElementById('mainNet').className = 'svalue ' + (mainNet >= 0 ? 'green' : 'red');

  let outHtml = '';
  outflow.forEach((item, idx) => {
    const abs = Math.abs(item.flow);
    const barPct = (abs / maxOut) * 100;
    const topCls = idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : '';
    outHtml += `<div class="item ${topCls}">
      <span class="irank">${idx+1}</span>
      <span class="iname">${item.name}</span>
      <div class="ibar" data-bar="${barPct}"><div class="bfill red-bar" style="width:0%"></div></div>
      <span class="ival red" data-target="${abs.toFixed(1)}">0.0亿</span>
    </div>`;
  });
  document.getElementById('outflowList').innerHTML = outHtml;

  let inHtml = '';
  inflow.forEach((item, idx) => {
    const abs = Math.abs(item.flow);
    const barPct = (abs / maxIn) * 100;
    const topCls = idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : '';
    inHtml += `<div class="item ${topCls}">
      <span class="irank">${idx+1}</span>
      <span class="iname">${item.name}</span>
      <div class="ibar" data-bar="${barPct}"><div class="bfill green-bar" style="width:0%"></div></div>
      <span class="ival green" data-target="${abs.toFixed(1)}">0.0亿</span>
    </div>`;
  });
  document.getElementById('inflowList').innerHTML = inHtml;

  // Animate both bars and values
  const items = document.querySelectorAll('.item');
  const DURATION = 12000;
  items.forEach((item, idx) => {
    const delay = idx * 150;
    const bar = item.querySelector('.ibar');
    const targetBar = bar ? bar.dataset.bar : 0;
    const fill = bar ? bar.querySelector('.bfill') : null;
    const valEl = item.querySelector('.ival');
    const targetVal = valEl ? parseFloat(valEl.dataset.target || '0') : 0;
    const isGreen = valEl && valEl.classList.contains('green');

    if (fill && targetBar) {
      fill.style.width = '0%';
      fill.style.transition = 'none';
      void fill.offsetWidth;
      setTimeout(() => {
        fill.style.transition = 'width ' + DURATION + 'ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        fill.style.width = targetBar + '%';
      }, delay);
    }

    if (valEl && targetVal > 0) {
      const prefix = isGreen ? '+' : '-';
      const startTime = Date.now() + delay;
      function animateVal() {
        const elapsed = Date.now() - startTime;
        if (elapsed < 0) { requestAnimationFrame(animateVal); return; }
        const progress = Math.min(elapsed / DURATION, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = (targetVal * eased).toFixed(1);
        valEl.textContent = prefix + current + '亿';
        if (progress < 1) requestAnimationFrame(animateVal);
      }
      requestAnimationFrame(animateVal);
    }
  });
}

let currentSession = 'close';
const SNAPSHOT_KEY = 'fund_board_snapshots';

function getSnapshots() {
  try { return JSON.parse(localStorage.getItem(SNAPSHOT_KEY)) || {}; }
  catch(e) { return {}; }
}

function saveSnapshot(session, data) {
  const snaps = getSnapshots();
  const dateStr = new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit'}).replace('/','月');
  snaps[dateStr + '_' + session] = {
    time: new Date().toLocaleString('zh-CN', {hour12: false}),
    outflow: data.outflow,
    inflow: data.inflow,
    idxData: data.idxData
  };
  localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(snaps));
}

function loadSnapshot(session) {
  const snaps = getSnapshots();
  const dateStr = new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit'}).replace('/','月');
  return snaps[dateStr + '_' + session] || null;
}

function autoDetectSession() {
  const h = new Date().getHours();
  const m = new Date().getMinutes();
  const totalMin = h * 60 + m;
  let session = 'close';
  if (totalMin >= 570 && totalMin < 690) session = 'morning';
  else if (totalMin >= 780 && totalMin < 900) session = 'noon';
  return session;
}

function updateSessionUI(session) {
  document.querySelectorAll('.s-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.session === session);
  });
  const labelMap = { morning: '早盘', noon: '午盘', close: '收盘' };
  const dateStr = new Date().toLocaleString('zh-CN',{month:'2-digit',day:'2-digit'}).replace('/','月');
  document.querySelector('.date-tag').textContent = dateStr + '日 ' + labelMap[session];
}

document.querySelectorAll('.s-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentSession = this.dataset.session;
    const snap = loadSnapshot(currentSession);
    if (snap) {
      render({ outflow: snap.outflow, inflow: snap.inflow, idxData: snap.idxData, isSnapshot: true, snapTime: snap.time });
    } else {
      refreshData();
    }
  });
});

function saveCurrentSnapshot(data) {
  saveSnapshot(currentSession, data);
}

async function refreshData() {
  const r = await fetchRealData();
  if (r && r.conceptData) {
    saveCurrentSnapshot({ outflow: r.conceptData.outflow, inflow: r.conceptData.inflow, idxData: r.idxData });
    render({ outflow: r.conceptData.outflow, inflow: r.conceptData.inflow, idxData: r.idxData });
  } else {
    render({ outflow: SCREENSHOT_DATA.outflow, inflow: SCREENSHOT_DATA.inflow, idxData: SCREENSHOT_DATA.index });
  }
}

function onSessionChange() {
  updateSessionUI(currentSession);
  const snap = loadSnapshot(currentSession);
  if (snap) {
    render({ outflow: snap.outflow, inflow: snap.inflow, idxData: snap.idxData, isSnapshot: true, snapTime: snap.time });
  } else {
    refreshData();
  }
}

currentSession = autoDetectSession();
onSessionChange();

setInterval(() => {
  const s = autoDetectSession();
  if (s !== currentSession) {
    currentSession = s;
    onSessionChange();
  }
  refreshData();
}, 60000);
</script>
</body>
</html>
